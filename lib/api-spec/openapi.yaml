openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Marketing OS Lite API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: workspaces
    description: Workspace management
  - name: members
    description: Workspace member management
  - name: brand-profiles
    description: Brand profile management
  - name: campaigns
    description: Campaign management
  - name: assets
    description: Generated ad assets
  - name: approvals
    description: Ad approval decisions
  - name: tracking-links
    description: UTM tracking links
  - name: metrics
    description: Ad performance metrics
  - name: connections
    description: Platform connections
  - name: audit-logs
    description: Audit log entries
  - name: meta
    description: Meta read-only integration
  - name: recommendations
    description: AI-driven recommendations
  - name: strategy
    description: Strategy intake and diagnosis
  - name: media-assets
    description: Creative asset library

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"

  # Workspaces
  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List all workspaces
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    put:
      operationId: updateWorkspace
      tags: [workspaces]
      summary: Update a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Workspace Members
  /workspaces/{id}/members:
    get:
      operationId: listWorkspaceMembers
      tags: [members]
      summary: List members of a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
    post:
      operationId: addWorkspaceMember
      tags: [members]
      summary: Add a member to a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberBody"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"

  /workspaces/{id}/members/{userId}:
    patch:
      operationId: updateWorkspaceMember
      tags: [members]
      summary: Change a member's role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
    delete:
      operationId: removeWorkspaceMember
      tags: [members]
      summary: Remove a member from a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # Brand Profiles
  /brand-profiles:
    get:
      operationId: listBrandProfiles
      tags: [brand-profiles]
      summary: List brand profiles
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of brand profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrandProfile"
    post:
      operationId: createBrandProfile
      tags: [brand-profiles]
      summary: Create a brand profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandProfileBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandProfile"

  /brand-profiles/{id}:
    get:
      operationId: getBrandProfile
      tags: [brand-profiles]
      summary: Get a brand profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandProfile"
    put:
      operationId: updateBrandProfile
      tags: [brand-profiles]
      summary: Update a brand profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandProfile"

  # Campaigns
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    put:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/approve:
    post:
      operationId: approveCampaign
      tags: [campaigns]
      summary: Mark a campaign as approved/ready
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/manual-publish:
    post:
      operationId: manualPublishCampaign
      tags: [campaigns]
      summary: Manually mark a campaign as published (demo only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualPublishBody"
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  # Assets
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List generated assets for a campaign
      parameters:
        - name: campaignId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedAsset"
    post:
      operationId: generateAssets
      tags: [assets]
      summary: Generate ad assets for a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAssetsBody"
      responses:
        "201":
          description: Generated assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedAsset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get a generated asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedAsset"
    patch:
      operationId: updateAssetBrief
      tags: [assets]
      summary: Update creative brief fields on an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetBriefBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedAsset"

  /assets/{id}/variants:
    get:
      operationId: getAssetVariants
      tags: [assets]
      summary: Get channel variants for an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Channel variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelVariant"

  # Approvals
  /approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      summary: List approvals for an asset or campaign
      parameters:
        - name: assetId
          in: query
          schema:
            type: integer
        - name: campaignId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalDecision"
    post:
      operationId: createApproval
      tags: [approvals]
      summary: Create an approval decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecision"

  # Tracking Links
  /tracking-links:
    get:
      operationId: listTrackingLinks
      tags: [tracking-links]
      summary: List tracking links
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tracking links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackingLink"
    post:
      operationId: createTrackingLink
      tags: [tracking-links]
      summary: Create a UTM tracking link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrackingLinkBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingLink"

  /tracking-links/{id}:
    delete:
      operationId: deleteTrackingLink
      tags: [tracking-links]
      summary: Delete a tracking link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Metrics
  /metrics:
    get:
      operationId: listMetrics
      tags: [metrics]
      summary: List ad metrics
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdMetric"

  /metrics/dashboard:
    get:
      operationId: getDashboardMetrics
      tags: [metrics]
      summary: Get dashboard summary metrics
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  # Connections
  /connections:
    get:
      operationId: listConnections
      tags: [connections]
      summary: List platform connections
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformConnection"
    post:
      operationId: createConnection
      tags: [connections]
      summary: Create a mock platform connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConnection"

  /connections/{id}:
    delete:
      operationId: deleteConnection
      tags: [connections]
      summary: Delete a platform connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /connections/{id}/sync:
    post:
      operationId: syncConnection
      tags: [connections]
      summary: Trigger a mock sync for a connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJobResult"

  # Audit Logs
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit-logs]
      summary: List audit log entries
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"

  # Meta
  /meta/status:
    get:
      operationId: getMetaStatus
      tags: [meta]
      summary: Get Meta integration status
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaStatus"

  /meta/sync:
    post:
      operationId: syncMeta
      tags: [meta]
      summary: Sync read-only Meta data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncMetaBody"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaSyncResult"

  # Recommendations
  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List recommendations
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: isRead
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  /recommendations/{id}:
    patch:
      operationId: updateRecommendation
      tags: [recommendations]
      summary: Update a recommendation (e.g. mark as read)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecommendationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

  /recommendations/generate:
    post:
      operationId: generateRecommendations
      tags: [recommendations]
      summary: Generate recommendations for a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  type: integer
              required: [workspaceId]
      responses:
        "200":
          description: Generated recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  # Strategy
  /strategy/intake:
    get:
      operationId: getStrategyIntake
      tags: [strategy]
      summary: Get strategy intake for a workspace
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy intake
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyIntake"
    post:
      operationId: createStrategyIntake
      tags: [strategy]
      summary: Create strategy intake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyIntakeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyIntake"
    put:
      operationId: updateStrategyIntake
      tags: [strategy]
      summary: Update strategy intake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyIntakeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyIntake"

  /strategy/diagnosis:
    post:
      operationId: generateStrategyDiagnosis
      tags: [strategy]
      summary: Generate a strategy diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  type: integer
              required: [workspaceId]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyDiagnosis"

  /strategy/diagnosis/latest:
    get:
      operationId: getLatestStrategyDiagnosis
      tags: [strategy]
      summary: Get the latest strategy diagnosis
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest diagnosis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyDiagnosis"

  /strategy/create-campaign:
    post:
      operationId: createCampaignFromStrategy
      tags: [strategy]
      summary: Create a campaign from strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  type: integer
              required: [workspaceId]
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  # Media Assets (creative asset library)
  /media-assets:
    get:
      operationId: listMediaAssets
      tags: [media-assets]
      summary: List media assets by workspace or campaign
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of media assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAsset"
    post:
      operationId: createMediaAsset
      tags: [media-assets]
      summary: Create a media asset reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaAssetBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"

  /media-assets/{id}:
    patch:
      operationId: updateMediaAsset
      tags: [media-assets]
      summary: Update a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMediaAssetBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
    delete:
      operationId: deleteMediaAsset
      tags: [media-assets]
      summary: Delete a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy]
      required: [status]

    Workspace:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        businessType:
          type: string
        country:
          type: string
        language:
          type: string
        defaultCurrency:
          type: string
        createdAt:
          type: string
      required: [id, name, businessType, country, language, defaultCurrency, createdAt]

    CreateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        businessType:
          type: string
        country:
