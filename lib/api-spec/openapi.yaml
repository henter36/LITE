openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Marketing OS Lite API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: workspaces
    description: Workspace management
  - name: members
    description: Workspace member management
  - name: brand-profiles
    description: Brand profile management
  - name: campaigns
    description: Campaign management
  - name: assets
    description: Generated content assets
  - name: media-assets
    description: Media asset references
  - name: approvals
    description: Approval workflow
  - name: connections
    description: Ad platform connections
  - name: tracking
    description: UTM tracking links
  - name: metrics
    description: Performance metrics
  - name: recommendations
    description: Rules-based recommendations
  - name: audit
    description: Audit log
  - name: strategy
    description: Strategy planning

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Workspaces
  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List all workspaces
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    put:
      operationId: updateWorkspace
      tags: [workspaces]
      summary: Update a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Workspace Members
  /workspaces/{id}/members:
    get:
      operationId: listWorkspaceMembers
      tags: [members]
      summary: List members of a workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
    post:
      operationId: addWorkspaceMember
      tags: [members]
      summary: Add a member to a workspace (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberBody"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"

  /workspaces/{id}/members/{userId}:
    patch:
      operationId: updateWorkspaceMember
      tags: [members]
      summary: Change a member's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
    delete:
      operationId: removeWorkspaceMember
      tags: [members]
      summary: Remove a member from a workspace (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # Brand Profiles
  /brand-profiles:
    get:
      operationId: listBrandProfiles
      tags: [brand-profiles]
      summary: List brand profiles
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of brand profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrandProfile"
    post:
      operationId: createBrandProfile
      tags: [brand-profiles]
      summary: Create a brand profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandProfileBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandProfile"

  /brand-profiles/{id}:
    get:
      operationId: getBrandProfile
      tags: [brand-profiles]
      summary: Get a brand profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandProfile"
    put:
      operationId: updateBrandProfile
      tags: [brand-profiles]
      summary: Update a brand profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandProfile"

  # Campaigns
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    put:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Media Assets
  /media-assets:
    get:
      operationId: listMediaAssets
      tags: [media-assets]
      summary: List media asset references
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: campaignId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of media assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAsset"
    post:
      operationId: createMediaAsset
      tags: [media-assets]
      summary: Create a media asset reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaAssetBody"
      responses:
        "201":
          description: Created media asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"

  /media-assets/{id}:
    patch:
      operationId: updateMediaAsset
      tags: [media-assets]
      summary: Update a media asset reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMediaAssetBody"
      responses:
        "200":
          description: Updated media asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
    delete:
      operationId: deleteMediaAsset
      tags: [media-assets]
      summary: Delete a media asset reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ... rest unchanged ...
components:
  schemas:
    # ... existing schemas unchanged ...
    MediaAssetType:
      type: string
      enum: [image, video, document, other]

    MediaAssetStatus:
      type: string
      enum: [draft, needs_review, approved, rejected]

    MediaAsset:
      type: object
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        campaignId:
          type: integer
          nullable: true
        title:
          type: string
        type:
          $ref: "#/components/schemas/MediaAssetType"
        urlOrReference:
          type: string
        description:
          type: string
        channel:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/MediaAssetStatus"
        createdBy:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, workspaceId, title, type, urlOrReference, description, status, createdBy, createdAt, updatedAt]

    CreateMediaAssetBody:
      type: object
      properties:
        workspaceId:
          type: integer
        campaignId:
          type: integer
          nullable: true
        title:
          type: string
        type:
          $ref: "#/components/schemas/MediaAssetType"
        urlOrReference:
          type: string
        description:
          type: string
        channel:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/MediaAssetStatus"
      required: [workspaceId, title, type, urlOrReference]

    UpdateMediaAssetBody:
      type: object
      properties:
        campaignId:
          type: integer
          nullable: true
        title:
          type: string
        type:
          $ref: "#/components/schemas/MediaAssetType"
        urlOrReference:
          type: string
        description:
          type: string
        channel:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/MediaAssetStatus"
